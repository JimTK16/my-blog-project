<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <clipPath id="lens-clip">
    <circle cx="16" cy="16" r="10.5"/>
  </clipPath>
  
  <!-- Outer lens ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#2D2A26" stroke-width="3"/>
  
  <!-- Terracotta lens flare / light reflection -->
  <path d="M 22 5.6 A 12 12 0 0 1 26.4 10" fill="none" stroke="#C75B39" stroke-width="3" stroke-linecap="round"/>
  
  <!-- The landscape within the lens -->
  <g clip-path="url(#lens-clip)">
    <!-- Ground / Mountains -->
    <path d="M 0 22 L 10 12 L 15 17 L 21 9 L 32 18 L 32 32 L 0 32 Z" fill="#2D2A26"/>
    <!-- Terracotta Sun/Moon rising -->
    <circle cx="15" cy="10" r="2.5" fill="#C75B39"/>
  </g>
</svg>